<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Birthday Mission — Neon Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050a0f;
      --surface: rgba(8, 16, 24, 0.92);
      --border: rgba(0,240,255,0.06);
      --border-hi: rgba(0,240,255,0.2);
      --text: #e0f0f8;
      --text-dim: rgba(180,220,240,0.5);
      --text-mid: rgba(180,220,240,0.72);
      --accent: #00e5ff;
      --accent-glow: rgba(0,229,255,0.35);
      --accent-soft: rgba(0,229,255,0.08);
      --gold: #f0c040;
      --gold-glow: rgba(240,192,64,0.25);
      --gold-soft: rgba(240,192,64,0.08);
      --success: #3ddc84;
      --success-glow: rgba(61,220,132,0.2);
      --danger: #ff4d6a;
      --cyan-dim: rgba(0,229,255,0.4);
      --heading: 'Orbitron', sans-serif;
      --body: 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--body); color: var(--text); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,60,80,0.4), transparent),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(0,40,60,0.25), transparent),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(0,30,50,0.2), transparent);
    }
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 80%);
    }
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    }
    /* ── HUD ELEMENTS ── */
    .hud-corner { position: absolute; width: 20px; height: 20px; }
    .hud-corner--tl { top: 0; left: 0; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .hud-corner--tr { top: 0; right: 0; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .hud-corner--bl { bottom: 0; left: 0; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .hud-corner--br { bottom: 0; right: 0; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .hud-label {
      font-family: var(--mono); font-size: 8px; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase; color: var(--cyan-dim);
    }
    .hud-value {
      font-family: var(--heading); font-size: 13px; font-weight: 900;
      text-transform: uppercase; color: var(--accent);
    }
    .hud-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .hud-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: hudPulse 2s ease-in-out infinite;
    }
    @keyframes hudPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes hudSweep {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .hud-sweep {
      background: linear-gradient(90deg, transparent 40%, rgba(0,229,255,0.06) 50%, transparent 60%);
      background-size: 200% 100%;
      animation: hudSweep 4s ease-in-out infinite;
    }
    @keyframes scanCardIn {
      0% {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
        filter: blur(1px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }
    .scan-card-in {
      animation: scanCardIn 360ms cubic-bezier(0.16,1,0.3,1) both;
    }
    .scan-reveal {
      opacity: 0;
      transform: translateY(10px);
      filter: blur(1px);
      pointer-events: none;
    }
    .scan-reveal.show {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
      pointer-events: auto;
      transition: opacity 320ms ease, transform 320ms ease, filter 320ms ease;
    }
    .hud-sweep-once {
      animation: hudSweep 950ms ease-out 1;
      opacity: 0.65;
      transition: opacity 300ms ease;
    }
    @keyframes sensorIntroPulse {
      0% {
        transform: scale(0.94);
        opacity: 0.7;
        filter: drop-shadow(0 0 0 rgba(0,229,255,0));
      }
      70% {
        transform: scale(1.02);
        opacity: 1;
        filter: drop-shadow(0 0 16px rgba(0,229,255,0.25));
      }
      100% {
        transform: scale(1);
        opacity: 1;
        filter: drop-shadow(0 0 0 rgba(0,229,255,0));
      }
    }
    .scan-sensor-intro {
      animation: sensorIntroPulse 420ms ease-out 1;
    }
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .app {
      position: relative; z-index: 1; width: 100%; max-width: 480px;
      height: 100vh; max-height: 100dvh;
      overflow-y: auto; overflow-x: hidden; scrollbar-width: none;
    }
    .app::-webkit-scrollbar { display: none; }
    .screen {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; justify-content: flex-start;
      padding: 20px 20px max(20px, env(safe-area-inset-bottom));
      opacity: 0; transform: translateY(12px);
      animation: screenIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .screen.center { justify-content: center; }
    .screen-header {
      position: sticky; top: 0; z-index: 2;
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: 12px;
      background: linear-gradient(to bottom, var(--bg) 70%, transparent);
    }
    .screen-footer {
      margin-top: auto;
      padding-top: 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 10px;
    }
    @keyframes screenIn { to { opacity: 1; transform: translateY(0); } }
    .screen-exit { animation: screenOut 0.3s cubic-bezier(0.55,0,1,0.45) forwards; }
    @keyframes screenOut { to { opacity: 0; transform: translateY(-10px) scale(0.98); } }

    @keyframes flipIn { 
      0% { transform: perspective(800px) rotateY(0deg); }
      100% { transform: perspective(800px) rotateY(180deg); }
    }
    @keyframes flipOut { 
      0% { transform: perspective(800px) rotateY(180deg); }
      100% { transform: perspective(800px) rotateY(0deg); }
    }
    .flip-container {
      perspective: 800px; width: 100%; cursor: pointer;
    }
    .flip-inner {
      position: relative; width: 100%; transition: transform 0.6s ease;
      transform-style: preserve-3d;
    }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back {
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      width: 100%; border-radius: 16px; overflow: hidden;
    }
    .flip-back {
      position: absolute; inset: 0;
      transform: rotateY(180deg);
    }
    .flip-hint {
      position: absolute;
      top: 22px;
      right: 22px;
      z-index: 3;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(0,229,255,0.38);
      background: radial-gradient(circle at 35% 30%, rgba(0,229,255,0.2), rgba(0,229,255,0.06) 55%, rgba(0,229,255,0.02));
      color: var(--accent);
      display: grid;
      place-items: center;
      box-shadow: 0 0 18px rgba(0,229,255,0.25), inset 0 0 14px rgba(0,229,255,0.1);
      animation: flipHintPulse 1.8s ease-in-out infinite;
      pointer-events: auto;
    }
    .flip-hint svg {
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 8px rgba(0,229,255,0.45));
      animation: flipHintNudge 1.8s ease-in-out infinite;
    }
    .flip-hint img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(0,229,255,0.5));
      animation: flipHintNudge 1.8s ease-in-out infinite;
    }
    @keyframes flipHintPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 18px rgba(0,229,255,0.22), inset 0 0 14px rgba(0,229,255,0.08); }
      50% { transform: scale(1.08); box-shadow: 0 0 26px rgba(0,229,255,0.36), inset 0 0 18px rgba(0,229,255,0.14); }
    }
    @keyframes flipHintNudge {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(8deg); }
      75% { transform: rotate(-8deg); }
    }

    .eyebrow {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); opacity: 0.85;
    }
    .eyebrow.gold { color: var(--gold); }
    h1, h2 {
      font-family: var(--heading); font-weight: 900; text-transform: uppercase;
      line-height: 1.05; letter-spacing: -0.02em;
    }
    h1 { font-size: clamp(28px, 7vw, 38px); margin-top: 12px; }
    h2 { font-size: clamp(22px, 5.5vw, 30px); margin-top: 10px; }
    .subtitle { color: var(--text-mid); font-size: 14px; line-height: 1.6; margin-top: 12px; }
    .em { color: var(--accent); }
    .em-gold { color: var(--gold); }
    .em-success { color: var(--success); }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
    .tag {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 6px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--text-dim);
      transition: all 0.3s ease;
    }
    .tag.active { border-color: var(--border-hi); color: var(--accent); background: var(--accent-soft); }

    .card {
      margin-top: 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; backdrop-filter: blur(12px);
    }
    .card-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim);
    }
    .card-body { padding: 20px; }

    .progress-track { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-top: 16px; }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent); border-radius: 2px;
      box-shadow: 0 0 12px var(--accent-glow); transition: width 0.3s ease;
    }
    .progress-meta {
      display: flex; justify-content: space-between; margin-top: 8px;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim);
    }
    .field-label {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
    }

    /* ── BIO AVATAR ── */
    .bio-avatar {
      width: 96px; height: 96px; border-radius: 50%; margin: 20px auto 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,229,255,0.04); border: 2px solid rgba(0,229,255,0.12);
      transition: all 0.5s ease;
    }
    .bio-avatar svg { width: 44px; height: 44px; opacity: 0.3; transition: opacity 0.5s; }
    .bio-avatar.confirmed {
      border-color: rgba(61,220,132,0.4); background: rgba(61,220,132,0.06);
      animation: avatarPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bio-avatar.confirmed svg { opacity: 0.7; }
    @keyframes avatarPop { from { transform: scale(0.9); } to { transform: scale(1); } }

    /* ── SENSOR ── */
    .sensor-area { margin-top: 32px; text-align: center; }
    .sensor-wrap { position: relative; width: 140px; height: 140px; margin: 0 auto; }
    .scan-focus-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 380px;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 1;
      background: radial-gradient(circle at center, rgba(0,229,255,0.09) 0 18%, transparent 19%);
    }
    .scan-focus-bg::before,
    .scan-focus-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(0,229,255,0.42);
      box-shadow: 0 0 26px rgba(0,229,255,0.22);
      transform: scale(0.32);
      opacity: 0;
      animation: scanWavePulse 2.4s ease-out infinite;
    }
    .scan-focus-bg::after {
      animation-delay: 1.2s;
    }
    @keyframes scanWavePulse {
      0% {
        transform: scale(0.28);
        opacity: 0;
      }
      16% {
        opacity: 0.9;
      }
      100% {
        transform: scale(1.18);
        opacity: 0;
      }
    }
    .sensor-ring { position: absolute; inset: 0; transform: rotate(-90deg); }
    .sensor-ring circle { fill: none; stroke-width: 3; }
    .sensor-ring .track { stroke: rgba(0,229,255,0.08); }
    .sensor-ring .fill {
      stroke: var(--accent); stroke-linecap: round;
      filter: drop-shadow(0 0 8px var(--accent-glow));
      transition: stroke 0.3s;
    }
    .sensor-ring .fill.done { stroke: var(--success); filter: drop-shadow(0 0 8px var(--success-glow)); }
    .sensor-btn {
      position: absolute; inset: 14px; border-radius: 50%;
      border: 2px solid rgba(0,229,255,0.15); background: rgba(0,229,255,0.03);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); cursor: pointer;
      transition: all 0.25s ease; -webkit-user-select: none; user-select: none; touch-action: none;
      z-index: 2;
    }
    .sensor-btn svg {
      width: 88px; height: 88px; opacity: 0.94;
      filter: drop-shadow(0 0 10px rgba(0,229,255,0.34));
      transition: transform 0.25s ease, opacity 0.25s ease, filter 0.25s ease;
    }
    .sensor-btn .fp-guide { opacity: 0.26; }
    .sensor-btn .fp-main { opacity: 1; }
    .sensor-btn .fp-detail { opacity: 0.7; }
    .sensor-btn:hover { background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.32); }
    .sensor-btn.pressing {
      background: rgba(0,229,255,0.12); border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow); transform: scale(0.96);
    }
    .sensor-btn.pressing svg {
      opacity: 1;
      transform: scale(1.05);
      filter: drop-shadow(0 0 18px rgba(0,229,255,0.52));
    }
    .sensor-btn.done {
      border-color: var(--success); color: var(--success);
      background: rgba(61,220,132,0.08); box-shadow: 0 0 30px var(--success-glow);
    }
    .sensor-btn.done svg {
      filter: drop-shadow(0 0 12px rgba(61,220,132,0.35));
    }
    .sensor-label {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim);
      margin-top: 18px; transition: color 0.3s;
    }
    .sensor-pct {
      font-family: var(--heading); font-size: 13px; font-weight: 900;
      color: var(--accent); margin-top: 6px; opacity: 0; transition: opacity 0.2s;
      letter-spacing: 0.05em;
    }
    .sensor-pct.show { opacity: 1; }
    .scan-status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 178px;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid rgba(0,229,255,0.32);
      background: rgba(0,229,255,0.05);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      box-shadow: inset 0 0 0 1px rgba(0,229,255,0.04);
    }
    .scan-copy {
      max-width: 300px;
      margin: 16px auto 0;
      color: var(--text-mid);
      font-size: 14px;
      line-height: 1.55;
      text-align: center;
      transition: opacity 220ms ease, transform 220ms ease, filter 220ms ease;
    }
    .scan-copy.hidden {
      opacity: 0;
      transform: translateY(-6px);
      filter: blur(2px);
    }

    /* ── SPINNER (post-scan processing) ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgba(0,229,255,0.15);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    .spinner.success { border-top-color: var(--success); }

    /* ── BUTTONS ── */
    .btn {
      display: block; width: 100%; padding: 16px; margin-top: 16px;
      border-radius: 12px; border: none;
      font-family: var(--heading); font-size: 12px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden;
    }
    .btn::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent); pointer-events: none;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary,
    .btn-gold,
    .btn-ghost {
      background: linear-gradient(180deg, #19dfff 0%, #00b8dd 100%);
      color: #062632;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 10px 30px rgba(0,229,255,0.34), 0 0 28px rgba(0,229,255,0.22), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .btn-primary:hover,
    .btn-gold:hover,
    .btn-ghost:hover {
      background: linear-gradient(180deg, #38e5ff 0%, #04c2e7 100%);
      box-shadow: 0 12px 34px rgba(0,229,255,0.42), 0 0 36px rgba(0,229,255,0.3), inset 0 1px 0 rgba(255,255,255,0.28);
    }
    .btn:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 3px;
    }
    .btn:disabled { opacity: 0.3; cursor: default; transform: none; }
    .btn-row { display: grid; gap: 10px; margin-top: 16px; }

    /* ── AGENT CARD ── */
    .agent-card {
      margin-top: 20px; border: 1px solid var(--border-hi); border-radius: 16px;
      background: linear-gradient(135deg, var(--surface), rgba(20,35,60,0.9)); overflow: hidden;
    }
    .agent-body { padding: 24px 20px; display: flex; gap: 20px; align-items: center; }
    .agent-avatar {
      flex-shrink: 0; width: 72px; height: 72px; border-radius: 16px;
      border: 1px solid var(--border-hi);
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,229,255,0.06);
      font-family: var(--heading); font-size: 28px; font-weight: 900; color: var(--accent);
    }
    .agent-info { flex: 1; min-width: 0; }
    .agent-codename {
      font-family: var(--heading); font-size: clamp(20px, 5vw, 26px);
      font-weight: 900; color: var(--accent); line-height: 1;
    }

    /* ── QUIZ ── */
    .options { display: grid; gap: 10px; margin-top: 20px; }
    .mission-card {
      padding: 20px; border: 1px solid var(--border); border-radius: 14px;
      background: var(--surface); cursor: pointer; transition: all 0.25s ease;
      position: relative; overflow: hidden;
    }
    .mission-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 14px;
      background: linear-gradient(135deg, rgba(0,229,255,0.06), transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .mission-card:hover { border-color: var(--border-hi); }
    .mission-card:hover::before { opacity: 1; }
    .mission-card.available { border-color: var(--border-hi); }
    .mission-card.available::before { opacity: 1; }
    .mission-card.selected {
      border-color: var(--accent); background: rgba(0,229,255,0.06);
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 20px rgba(0,229,255,0.03);
    }
    .mission-card.selected::before { opacity: 1; }
    .mission-card.locked {
      opacity: 0.4; cursor: not-allowed; pointer-events: auto;
    }
    .mission-card.locked:hover { border-color: var(--border); }
    .mission-card.locked:hover::before { opacity: 0.35; }

    .locked-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 8, 14, 0.76);
      backdrop-filter: blur(4px);
    }
    .locked-modal-backdrop.show { display: flex; }
    .locked-modal {
      width: min(420px, 100%);
      border-radius: 14px;
      border: 1px solid rgba(0,229,255,0.32);
      background: linear-gradient(165deg, rgba(8,16,24,0.98), rgba(6,14,21,0.96));

// ─── PARTICLES ───
(function() {
  const c=document.getElementById("particles"), ctx=c.getContext("2d");
  let dots=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function spawn(){
    dots=Array.from({length:40},()=>({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight,
      r:Math.random()*1.2+0.3,dx:(Math.random()-0.5)*0.15,dy:(Math.random()-0.5)*0.15,
      a:Math.random()*0.3+0.05
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(const d of dots){
      d.x+=d.dx;d.y+=d.dy;
      if(d.x<0)d.x=c.width;if(d.x>c.width)d.x=0;
      if(d.y<0)d.y=c.height;if(d.y>c.height)d.y=0;
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle="rgba(0,229,255,"+d.a+")";ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize();spawn();draw();
  addEventListener("resize",()=>{resize();spawn();});
})();

// ─── CONFETTI ───
function fireConfetti(){
  const c=document.getElementById("confetti"),ctx=c.getContext("2d");
  c.width=innerWidth;c.height=innerHeight;
  const ps=Array.from({length:120},()=>({
    x:innerWidth/2+(Math.random()-0.5)*200,y:innerHeight/2,
    vx:(Math.random()-0.5)*14,vy:Math.random()*-16-4,
    r:Math.random()*4+2,
    color:["#00e5ff","#f0c040","#3ddc84","#ff4d6a","#fff"][Math.floor(Math.random()*5)],
    rot:Math.random()*360,rv:(Math.random()-0.5)*12,life:1
  }));
  (function f(){
    ctx.clearRect(0,0,c.width,c.height);let alive=false;
    for(const p of ps){
      if(p.life<=0)continue;alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.35;p.rot+=p.rv;p.life-=0.008;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
      ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);ctx.restore();
    }
    if(alive)requestAnimationFrame(f);else ctx.clearRect(0,0,c.width,c.height);
  })();
}

  if($skip){

  }

  const lines=[
    {t:0,    txt:"$ neon-ops --init --secure",                       clr:"var(--text)"},
    {t:300,  txt:"[SYS] Inicialitzant protocol Neon Ops v4.2.1...", clr:"var(--text-dim)"},

    {t:8500, txt:"[OK] ▶ Seqüència completada · Redirigint a verificació biomètrica...", clr:"var(--success)"}
  ];

  const dur=9000;

  // Grow the terminal panel first, then begin typing.
  if($termBox){
    const target=Math.min(Math.round(innerHeight*0.55), 420);
    requestAnimationFrame(()=>{$termBox.style.height=target+"px";});

  function runTyping(){
    const tStart=Date.now();
    BOOT.intervalId=setInterval(()=>{
      if(BOOT.skipped){
        clearBootTimers();

      }
      const elapsed=Date.now()-tStart;
      const p=Math.min(100,Math.round(elapsed/dur*100));
      if($fill)$fill.style.width=p+"%";

      while(printed<lines.length && elapsed>=lines[printed].t){

  const sensorBtn=document.getElementById("sensorBtn");
  const ringFill=document.getElementById("ringFill");
  const sLabel=document.getElementById("sensorLabel");

  const scanCopy=document.getElementById("scanCopy");
  const accessChip=document.getElementById("scanAccessChip");
  const tagScan=document.getElementById("tagScan");
  const tagAccess=document.getElementById("tagAccess");
  let holdTimer=null,startTime=0,rafId=null,done=false;
  const HOLD=4000;

  function startHold(e){
    if(done)return;e.preventDefault();
    startTime=Date.now();
    sensorBtn.classList.add("pressing");
    sLabel.textContent="Escanejant empremta dactilar...";
    sPct.classList.add("show");
    if(scanCopy) scanCopy.classList.add("hidden");

      accessChip.style.borderColor="rgba(0,229,255,0.42)";
      accessChip.style.background="rgba(0,229,255,0.08)";
    }
    tagScan.textContent="Scanning...";
    tagScan.style.borderColor="rgba(0,229,255,0.3)";
    tagScan.style.color="var(--accent)";
    tagScan.style.background="var(--accent-soft)";
    tick();
    holdTimer=setTimeout(onScanDone,HOLD);
  }

  function endHold(e){
    if(done)return;e.preventDefault();
    clearTimeout(holdTimer);cancelAnimationFrame(rafId);
    sensorBtn.classList.remove("pressing");
    ringFill.style.strokeDashoffset=circ;
    sLabel.textContent="Prem i mantén durant 4 segons";
    sPct.classList.remove("show");
    sPct.textContent="0%";
    if(scanCopy) scanCopy.classList.remove("hidden");
    if(accessChip){
      accessChip.textContent="Accés bloquejat";
      accessChip.style.color="var(--accent)";
      accessChip.style.borderColor="rgba(0,229,255,0.32)";
      accessChip.style.background="rgba(0,229,255,0.05)";
    }
    tagScan.textContent="Esperant scan";
    tagScan.style.borderColor="";tagScan.style.color="";tagScan.style.background="";
  }

  function tick(){
    const pct=Math.min(1,(Date.now()-startTime)/HOLD);
    ringFill.style.strokeDashoffset=circ*(1-pct);
    sPct.textContent=Math.round(pct*100)+"%";
    if(pct<1)rafId=requestAnimationFrame(tick);
  }

  function onScanDone(){
    // Phase 1: Scan complete
    done=true;cancelAnimationFrame(rafId);
    ringFill.style.strokeDashoffset=0;
    sPct.textContent="100%";
    sensorBtn.classList.remove("pressing");
    sLabel.innerHTML='<span class="spinner"></span>Scan completat · Verificant identitat...';
    if(scanCopy) scanCopy.classList.add("hidden");
    if(accessChip){
      accessChip.textContent="Verificant identitat";
      accessChip.style.color="var(--accent)";
      accessChip.style.borderColor="rgba(0,229,255,0.42)";
      accessChip.style.background="rgba(0,229,255,0.08)";
    }
    tagScan.textContent="Scan OK";
    tagScan.style.borderColor="rgba(61,220,132,0.3)";
    tagScan.style.color="var(--success)";
    tagScan.style.background="rgba(61,220,132,0.08)";

    // Phase 2: After 1.5s — "processing"
    setTimeout(()=>{
      sLabel.innerHTML='<span class="spinner"></span>Comparant dades biomètriques...';
    },1500);

    // Phase 3: After 3s — access granted
    setTimeout(()=>{
      ringFill.classList.add("done");
      sensorBtn.classList.add("done");
      sensorBtn.innerHTML='<span style="font-size:36px">✓</span>';
      sLabel.innerHTML='Accés concedit';
      sLabel.style.color="var(--success)";
      sPct.style.color="var(--success)";
      if(accessChip){
        accessChip.textContent="Accés concedit";
        accessChip.style.color="var(--success)";
        accessChip.style.borderColor="rgba(61,220,132,0.34)";
        accessChip.style.background="rgba(61,220,132,0.08)";
      }
      tagAccess.textContent="Accés concedit";
      tagAccess.style.borderColor="rgba(61,220,132,0.3)";
      tagAccess.style.color="var(--success)";
      tagAccess.style.background="rgba(61,220,132,0.08)";
    },3200);

    // Phase 4: After 4.5s — navigate
    setTimeout(()=>go("agent"),4500);
  }

  sensorBtn.addEventListener("mousedown",startHold);
  sensorBtn.addEventListener("mouseup",endHold);
  sensorBtn.addEventListener("mouseleave",endHold);
  sensorBtn.addEventListener("touchstart",startHold,{passive:false});
  sensorBtn.addEventListener("touchend",endHold,{passive:false});
  sensorBtn.addEventListener("touchcancel",endHold,{passive:false});

  // ── Hidden triple-tap on top area → skip to agent screen ──
  let _tapCount=0, _tapTimer=null;
  const scanTop=document.getElementById("scanTop");
  if(scanTop){
    scanTop.addEventListener("click",()=>{
      _tapCount++;
      clearTimeout(_tapTimer);
      if(_tapCount>=3){ _tapCount=0; go("agent"); return; }
      _tapTimer=setTimeout(()=>{ _tapCount=0; },600);
    });
  }
}

// ─── BRIEFING ───
function vBriefing(){
  const missions=[
    {
      id:"birthday",
      name:"Birthday Impossible",
      desc:"3 proves classificades per desbloquejar un paquet secret. Nivell de risc: alt.",
      difficulty:"Mitjà-Alt",
      phases:3,
      status:"available",
      reward:"Paquet secret"
    },
    {
      id:"locked1",
      name:"Operation Phantom",
      desc:"Missió d'infiltració avançada. Requereix clearance nivell 7.",
      difficulty:"Expert",
      phases:5,
      status:"locked"
    },
    {
      id:"locked2",
      name:"Protocol Zero",
      desc:"Desactivació de sistemes enemics. Només agents veterants.",
      difficulty:"Letal",
      phases:4,
      status:"locked"
    }
  ];

  let selected=null;

  function getLockedReason(mid){
    if(mid==="locked1") return "Aquesta missió depèn de completar primer Birthday Impossible. Quan la superis, s'activarà el compte enrere de desbloqueig.";
    if(mid==="locked2") return "Primer cal completar Birthday Impossible i la missió Operation Phantom. Després hauràs d'esperar el temps de desbloqueig.";
    return "Aquesta missió encara no està disponible perquè depèn de nivells anteriors.";
  }

  function renderBriefing(){
    const cardsHtml=missions.map(m=>{
      const isSelected=selected===m.id;
      const isLocked=m.status==="locked";
      const cls="mission-card"+(isSelected?" selected":"")+(isLocked?" locked":" available");
      const badge=isLocked?'<span class="mc-badge locked">Bloquejat</span>':
                  isSelected?'<span class="mc-badge selected-badge">Seleccionat</span>':
                  '<span class="mc-badge available">Disponible</span>';
      return '<div class="'+cls+'" data-mission="'+m.id+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
          '<div style="font-family:var(--heading);font-size:16px;font-weight:900;text-transform:uppercase;color:'+(isLocked?'var(--text-dim)':isSelected?'var(--accent)':'var(--text)')+'">'+m.name+'</div>'+
          badge+
        '</div>'+
        '<div style="font-size:14px;color:var(--text-dim);line-height:1.6;margin-bottom:14px">'+m.desc+'</div>'+
        '<div style="display:flex;gap:14px;font-family:var(--mono);font-size:10px;color:var(--text-dim)">'+
          '<span>'+(isLocked?'??':m.phases)+' fases</span>'+
          '<span>Dificultat: <span style="color:'+(m.difficulty==='Letal'?'var(--danger)':m.difficulty==='Expert'?'var(--gold)':'var(--accent)')+'">'+m.difficulty+'</span></span>'+
          (m.reward?'<span>'+m.reward+'</span>':'')+
        '</div>'+
      '</div>';
    }).join('');

    $app.innerHTML='<div class="screen">'+
      '<div class="screen-header">'+
        '<div class="eyebrow">Mission Select</div>'+
        '<h2>Missions <span class="em">disponibles</span></h2>'+
      '</div>'+
      '<p class="subtitle" style="margin-bottom:24px">Agent <strong style="color:var(--accent)">'+esc(AGENT_NAME)+'</strong>, selecciona una missió per continuar.</p>'+
      '<div style="display:flex;flex-direction:column;gap:14px">'+
        cardsHtml+
      '</div>'+
      '<div class="screen-footer">'+
        '<button class="btn btn-primary" id="accept" '+(selected?'':'disabled style="opacity:0.4;pointer-events:none"')+'>Començar missió</button>'+
      '</div>'+
      '<div class="locked-modal-backdrop" id="lockedModal" aria-hidden="true">'+
        '<div class="locked-modal" id="lockedModalCard" role="dialog" aria-modal="true" aria-labelledby="lockedTitle">'+
          '<h3 id="lockedTitle">Missió no disponible</h3>'+
          '<p id="lockedMessage">Aquesta missió encara no està disponible.</p>'+
          '<span class="modal-hint">Dependències actives · desbloqueig progressiu</span>'+
          '<button class="btn btn-primary" id="lockedModalClose">Entesos</button>'+
        '</div>'+
      '</div>'+
    '</div>';

    const lockedModal=document.getElementById("lockedModal");
    const lockedModalCard=document.getElementById("lockedModalCard");
    const lockedMessage=document.getElementById("lockedMessage");
    const lockedModalClose=document.getElementById("lockedModalClose");

    function openLockedModal(mid){
      if(!lockedModal || !lockedMessage) return;
      lockedMessage.textContent=getLockedReason(mid);
      lockedModal.classList.add("show");
      lockedModal.setAttribute("aria-hidden","false");
    }
    function closeLockedModal(){
      if(!lockedModal) return;
      lockedModal.classList.remove("show");
      lockedModal.setAttribute("aria-hidden","true");
    }

    document.querySelectorAll("[data-mission]").forEach(el=>{
      el.onclick=()=>{
        const mid=el.getAttribute("data-mission");
        const mission=missions.find(m=>m.id===mid);
        if(!mission) return;
        if(mission.status==="locked"){
          openLockedModal(mid);
          return;
        }
        selected=mid;
        renderBriefing();
      };
    });
    if(lockedModal) lockedModal.onclick=closeLockedModal;
    if(lockedModalCard) lockedModalCard.onclick=(e)=>e.stopPropagation();
    if(lockedModalClose) lockedModalClose.onclick=closeLockedModal;
    const btn=document.getElementById("accept");
    if(btn && selected) btn.onclick=()=>{S.qIdx=0;S.picked=null;S.correct=null;go("question");};
  }

  renderBriefing();
}

// ─── QUESTION ───
function vQuestion(){
  const q=QUESTIONS[S.qIdx],num=S.qIdx+1,total=QUESTIONS.length;
  const pct=Math.round(num/total*100);
  let optsHtml="";
  for(let i=0;i<q.opts.length;i++){
    let cls="option",icon="";
    if(S.correct===true&&q.answer===i){cls+=" correct";icon="\u2713";}
    else if(S.picked===i&&S.correct===false){cls+=" wrong";icon="\u2717";}
    optsHtml+='<button class="'+cls+'" data-i="'+i+'"><span>'+esc(q.opts[i])+'</span><span class="opt-icon">'+icon+'</span></button>';
  }
  let fbHtml="";
  if(S.correct!==null){
    fbHtml='<div class="feedback-bar '+(S.correct?"ok":"ko")+'"><span>'+(S.correct?q.ok:q.ko)+'</span></div>';
    if(q.optInfo && S.picked!==null){
      const isOk=S.correct;
      fbHtml+='<div class="opt-info-panel '+(isOk?"opt-info-panel--ok":"opt-info-panel--ko")+'">'
        +'<div class="opt-info-label">'+(isOk?'✓ ':' ✗ ')+esc(q.opts[S.picked])+'</div>'
        +'<p class="opt-info-text">'+esc(q.optInfo[S.picked])+'</p>'
        +'</div>';
    }
  }
  let nxHtml="";
  if(S.correct===true) nxHtml='<button class="btn btn-primary" id="nextQ">'+(num===total?"Unlock Package":"Següent prova")+'</button>';

  $app.innerHTML='<div class="screen" id="rewardScreen">'+
    '<div class="screen-header">'+
      '<div class="eyebrow" style="font-size:12px">'+esc(q.level)+'</div>'+
      '<h2>'+esc(q.q)+'</h2>'+
      '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-meta"><span>Progrés</span><span>'+num+'/'+total+'</span></div>'+
    '</div>'+
    '<div class="options">'+optsHtml+'</div>'+
    '<div class="screen-footer">'+fbHtml+nxHtml+'</div>'+
  '</div>';

  document.querySelectorAll("[data-i]").forEach(el=>{
    el.onclick=()=>{
      if(S.correct===true)return;
      const i=parseInt(el.getAttribute("data-i"));
      S.picked=i;S.correct=i===QUESTIONS[S.qIdx].answer;render();
    };
  });
  const nb=document.getElementById("nextQ");
  if(nb) nb.onclick=()=>{
    S.picked=null;S.correct=null;
    if(S.qIdx<QUESTIONS.length-1){S.qIdx++;go("question");}
    else go("success");
  };
}
